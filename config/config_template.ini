[deepseek_apikey]
# 多个 key 用英文逗号分隔
key =

[cosyvoice]
# CosyVoice 服务地址（本地或云端）
host = 127.0.0.1
port = 50000
device = gpu
# 音频采样率: CosyVoice 1.x 默认 22050, CosyVoice2 默认 24000
sample_rate = 22050
model_dir =

[heygem]
# HeyGem 数字人服务地址
host = 127.0.0.1
port = 8383

[tuilionnx]
# TuiliONNX 数字人服务地址
host = 127.0.0.1
port = 8384

[ffmpeg]
# FFmpeg 可执行文件路径（留空则使用系统 PATH）
bin_path =

[browser]
# Chrome 浏览器路径（用于多平台发布）
LOCAL_CHROME_PATH =
# Chrome 调试端口
debug_port = 9222

[server]
# FastAPI 服务配置
host = 0.0.0.0
port = 8000

[output]
# 输出文件目录
base_dir = output

[cloud_gpu]
# 云端 GPU 服务配置（当本地 GPU 不足时使用）
enabled = false
api_url =
api_key =
